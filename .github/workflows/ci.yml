name: CI (tests)

# Fast feedback on every push / PR: compiles and runs all unit tests on a real
# macos-14 runner (Xcode → swift test works). No signing/notarization here —
# that lives in release.yml and only fires on a v* tag.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Matcher unit tests
        run: cd shared && swift test

      - name: Helper unit tests (PIN gating, IPC dispatch, DNS wire)
        run: cd helper && swift test

      - name: Helper builds (release)
        run: cd helper && swift build -c release

      - name: Shell — install, type-check, unit tests
        run: |
          cd electron
          npm ci
          npm run lint
          npm test
